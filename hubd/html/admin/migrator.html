#parse("/inc/top.html")
<div id="middle" class="admin_migrator">
    <div style="max-width: 800px; margin: auto">
        <h2>Migrate page to other website</h2>
        <div class="flexible" id="form" style="margin-top: 20px">
            <select class="flexable" name="page" placeholder="page" url="/edit"></select>
            <select class="flexable" name="destination" placeholder="destination" url="/admin/migrator"></select>
            <button id="migrate">migrate</button>
        </div>
        <script type="text/javascript">
            sys.push(function () {
                var destination = $('[name=destination]');
                destination.selectable();
                var page = $('[name=page]');
                page.selectable();
                var form = $('#form');
                $('#migrate').on('click', function () {
                    var loading = sys.loading();
                    form.after(loading);
                    form.hide(0);
                    api.post('/admin/migrator', {
                        action: 'migrate',
                        id: page.val(),
                        destination: destination.val()
                    }, function (rez) {
                        if (rez.ok) {

                        }
                        form.show(0);
                    });
                });
            })
        </script>
    </div>
</div>
#parse("/inc/bottom.html")

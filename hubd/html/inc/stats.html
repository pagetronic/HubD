<div>
    <div class="bx" id="stats">
        <h1>#lang('ANALYTICS','ucfirst')</h1>
        #foreach($stat in $stats)
        #if($velocityCount==0)
        <h1 style="font-size:70px" id="now">#number($stat.unique)</h1>
        #else
        <p><strong>#number($stat.unique) Uniques - #number($stat.view) Views</strong>
            #if($stat.start)<br/>#date($stat.start,'full') &rArr; #date($stat.stop,'full')#end</p>
        #end
        #end
    </div>
    <script type="text/javascript">
        sys.push(function () {
            var nowTimeout = -1;
            var reload = function () {

                ajax.get('/admin/stats', function (html) {
                    html = $(html);
                    var stats = $('#stats');
                    var nowval = stats.find('#now').text();
                    stats.html(html.find('#stats').html());
                    var now = $('#now');
                    if (nowval !== now.text()) {
                        now.pulse();
                    }
                    clearTimeout(nowTimeout);
                    nowTimeout = setTimeout(reload, 3000);
                }, function () {
                    clearTimeout(nowTimeout);
                    nowTimeout = setTimeout(reload, 3000);
                });
            };
            ajax.unload(function () {
            });
            reload();
        });
    </script>
</div>

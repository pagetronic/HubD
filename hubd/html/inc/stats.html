<div>
    <div class="bx" id="stats">
        <h1>#lang('ANALYTICS','ucfirst')</h1>
        #foreach($stat in $stats)
        #if($velocityCount==0)
        <h1 style="font-size:70px" id="now">#number($stat.unique)</h1>
        #else
        <p><strong>#number($stat.unique) Uniques - #number($stat.view) Views</strong>
            #if($stat.start)<br/>#date($stat.start,'full') &rArr; #date($stat.stop,'full')#end</p>
        #end
        #end
    </div>
    <script type="text/javascript">
        sys.push(function () {
            var now = $('#now');
            var act = socket.send({action: "live"}, function (msg) {
                if (now.text() !== msg.live) {
                    now.text(msg.live).pulse();
                }
                return true;
            });
            ajax.unload(function () {
                socket.abort(act);
            });
        });
    </script>
</div>
